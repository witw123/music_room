global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: music-room-server
    metrics_path: /metrics
    static_configs:
      - targets: ["server:3001"]
    authorization:
      type: Bearer
      credentials: "${METRICS_TOKEN}"
