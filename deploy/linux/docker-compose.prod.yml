services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_SHARED_SECRET}
      - --realm=${TURN_REALM}
      - --min-port=${TURN_MIN_PORT}
      - --max-port=${TURN_MAX_PORT}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --no-cli
      - --no-multicast-peers
      - --listening-port=${TURN_PORT:-3478}
      - --tls-listening-port=${TURN_TLS_PORT:-5349}

  server:
    image: ghcr.io/${GHCR_OWNER}/music-room-server:${RELEASE_TAG}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      TRUST_PROXY: ${TRUST_PROXY:-loopback}
      APP_DOMAIN: ${APP_DOMAIN}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_MODE: ${REDIS_MODE}
      REDIS_URL: ${REDIS_URL}
      REDIS_SENTINELS: ${REDIS_SENTINELS}
      REDIS_SENTINEL_MASTER_NAME: ${REDIS_SENTINEL_MASTER_NAME}
      REDIS_SENTINEL_USERNAME: ${REDIS_SENTINEL_USERNAME}
      REDIS_SENTINEL_PASSWORD: ${REDIS_SENTINEL_PASSWORD}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      JWT_SECRET: ${JWT_SECRET}
      AUDIT_HASH_SECRET: ${AUDIT_HASH_SECRET}
      METRICS_TOKEN: ${METRICS_TOKEN}
      ADMIN_PANEL_ENABLED: ${ADMIN_PANEL_ENABLED:-true}
      ADMIN_MUTATIONS_ENABLED: ${ADMIN_MUTATIONS_ENABLED:-false}
      CLIENT_TELEMETRY_ENABLED: ${CLIENT_TELEMETRY_ENABLED:-true}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TURN_ENABLED: ${TURN_ENABLED}
      TURN_PUBLIC_HOST: ${TURN_PUBLIC_HOST}
      TURN_PORT: ${TURN_PORT}
      TURN_MIN_PORT: ${TURN_MIN_PORT}
      TURN_MAX_PORT: ${TURN_MAX_PORT}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET}
      TURN_REALM: ${TURN_REALM}
      TURN_PROTOCOLS: ${TURN_PROTOCOLS:-udp,tcp,tls}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
      TURN_PUBLIC_HOST_USE_APP_DOMAIN: ${TURN_PUBLIC_HOST_USE_APP_DOMAIN:-0}
      TURN_PUBLIC_HOST_USE_REQUEST_HOST: ${TURN_PUBLIC_HOST_USE_REQUEST_HOST:-0}
      NETEASE_ENABLED: ${NETEASE_ENABLED:-false}
      NETEASE_COOKIE_ENCRYPTION_KEY: ${NETEASE_COOKIE_ENCRYPTION_KEY:-}
      NETEASE_DEFAULT_QUALITY: ${NETEASE_DEFAULT_QUALITY:-exhigh}
      NETEASE_MAX_IMPORT_BYTES: ${NETEASE_MAX_IMPORT_BYTES:-209715200}
      NETEASE_REQUEST_TIMEOUT_MS: ${NETEASE_REQUEST_TIMEOUT_MS:-15000}
      QQMUSIC_ENABLED: ${QQMUSIC_ENABLED:-false}
      KUGOU_ENABLED: ${KUGOU_ENABLED:-false}
      KUWO_ENABLED: ${KUWO_ENABLED:-false}
      TAIHE_ENABLED: ${TAIHE_ENABLED:-false}
      MIGU_ENABLED: ${MIGU_ENABLED:-false}
      BAIDU_ENABLED: ${BAIDU_ENABLED:-false}
      METING_DEFAULT_QUALITY: ${METING_DEFAULT_QUALITY:-exhigh}
      METING_MAX_IMPORT_BYTES: ${METING_MAX_IMPORT_BYTES:-209715200}
      METING_REQUEST_TIMEOUT_MS: ${METING_REQUEST_TIMEOUT_MS:-15000}
      METING_URL_RETRY_COUNT: ${METING_URL_RETRY_COUNT:-1}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/${GHCR_OWNER}/music-room-web:${RELEASE_TAG}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
      coturn:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_SOCKET_PATH: ${NEXT_PUBLIC_SOCKET_PATH}
      NEXT_PUBLIC_STUN_URL: ${NEXT_PUBLIC_STUN_URL}
      NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL}
      NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME}
      NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL}
      NEXT_PUBLIC_WEBRTC_ICE_SERVERS: ${NEXT_PUBLIC_WEBRTC_ICE_SERVERS}
      NEXT_PUBLIC_CLIENT_TELEMETRY_ENABLED: ${NEXT_PUBLIC_CLIENT_TELEMETRY_ENABLED:-true}
      NEXT_PUBLIC_NETEASE_ENABLED: ${NEXT_PUBLIC_NETEASE_ENABLED:-false}
      NEXT_PUBLIC_QQMUSIC_ENABLED: ${NEXT_PUBLIC_QQMUSIC_ENABLED:-false}
      NEXT_PUBLIC_KUGOU_ENABLED: ${NEXT_PUBLIC_KUGOU_ENABLED:-false}
      NEXT_PUBLIC_KUWO_ENABLED: ${NEXT_PUBLIC_KUWO_ENABLED:-false}
      NEXT_PUBLIC_TAIHE_ENABLED: ${NEXT_PUBLIC_TAIHE_ENABLED:-false}
      NEXT_PUBLIC_MIGU_ENABLED: ${NEXT_PUBLIC_MIGU_ENABLED:-false}
      NEXT_PUBLIC_BAIDU_ENABLED: ${NEXT_PUBLIC_BAIDU_ENABLED:-false}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/music-room.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/music-room.routes.conf:/etc/nginx/conf.d/music-room.routes.conf:ro
      - certbot_certs:/etc/letsencrypt:ro

  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.54.1
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./observability-rendered/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]

  grafana:
    profiles: [observability]
    image: grafana/grafana:11.2.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: https://${APP_DOMAIN}/ops/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

  alertmanager:
    profiles: [observability]
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    environment:
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL}
    volumes:
      - ./observability-rendered/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command: ["--config.file=/etc/alertmanager/alertmanager.yml"]

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
  prometheus_data:
  grafana_data:
