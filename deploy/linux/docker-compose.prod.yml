services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4.6.3
    restart: unless-stopped
    network_mode: host
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --use-auth-secret
      - --static-auth-secret=${TURN_SHARED_SECRET}
      - --realm=${TURN_REALM}
      - --min-port=${TURN_MIN_PORT}
      - --max-port=${TURN_MAX_PORT}
      - --external-ip=${TURN_EXTERNAL_IP}
      - --no-cli
      - --no-multicast-peers
      - --listening-port=${TURN_PORT:-3478}
      - --tls-listening-port=${TURN_TLS_PORT:-5349}

  server:
    image: ${SERVER_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      TRUST_PROXY: ${TRUST_PROXY:-loopback}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_MODE: ${REDIS_MODE}
      REDIS_URL: ${REDIS_URL}
      REDIS_SENTINELS: ${REDIS_SENTINELS}
      REDIS_SENTINEL_MASTER_NAME: ${REDIS_SENTINEL_MASTER_NAME}
      REDIS_SENTINEL_USERNAME: ${REDIS_SENTINEL_USERNAME}
      REDIS_SENTINEL_PASSWORD: ${REDIS_SENTINEL_PASSWORD}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TURN_ENABLED: ${TURN_ENABLED}
      TURN_PUBLIC_HOST: ${TURN_PUBLIC_HOST}
      TURN_PORT: ${TURN_PORT}
      TURN_TLS_PORT: ${TURN_TLS_PORT}
      TURN_MIN_PORT: ${TURN_MIN_PORT}
      TURN_MAX_PORT: ${TURN_MAX_PORT}
      TURN_SHARED_SECRET: ${TURN_SHARED_SECRET}
      TURN_REALM: ${TURN_REALM}
      TURN_PROTOCOLS: ${TURN_PROTOCOLS}
      TURN_TTL_SECONDS: ${TURN_TTL_SECONDS}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP}
      TURN_PUBLIC_HOST_USE_APP_DOMAIN: ${TURN_PUBLIC_HOST_USE_APP_DOMAIN:-0}
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
      coturn:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_SOCKET_PATH: ${NEXT_PUBLIC_SOCKET_PATH}
      NEXT_PUBLIC_STUN_URL: ${NEXT_PUBLIC_STUN_URL}
      NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL}
      NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME}
      NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL}
      NEXT_PUBLIC_WEBRTC_ICE_SERVERS: ${NEXT_PUBLIC_WEBRTC_ICE_SERVERS}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_started
      server:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/music-room.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/music-room.routes.conf:/etc/nginx/conf.d/music-room.routes.conf:ro
      - certbot_certs:/etc/letsencrypt:ro

volumes:
  postgres_data:
  redis_data:
  certbot_certs:
