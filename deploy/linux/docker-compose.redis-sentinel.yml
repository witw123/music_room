services:
  redis-master:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_master_data:/data

  redis-replica-1:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis-master
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --replicaof
      - redis-master
      - "6379"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_replica_1_data:/data

  redis-replica-2:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis-master
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --replicaof
      - redis-master
      - "6379"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --masterauth
      - ${REDIS_PASSWORD}
    volumes:
      - redis_replica_2_data:/data

  redis-sentinel-1:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    command: >
      sh -c "cat <<EOF >/etc/redis/sentinel.conf
      port 26379
      sentinel monitor ${REDIS_SENTINEL_MASTER_NAME} redis-master 6379 2
      sentinel auth-pass ${REDIS_SENTINEL_MASTER_NAME} ${REDIS_PASSWORD}
      sentinel down-after-milliseconds ${REDIS_SENTINEL_MASTER_NAME} 5000
      sentinel failover-timeout ${REDIS_SENTINEL_MASTER_NAME} 10000
      sentinel parallel-syncs ${REDIS_SENTINEL_MASTER_NAME} 1
      EOF
      && redis-sentinel /etc/redis/sentinel.conf"
    ports:
      - "26379:26379"

  redis-sentinel-2:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    command: >
      sh -c "cat <<EOF >/etc/redis/sentinel.conf
      port 26379
      sentinel monitor ${REDIS_SENTINEL_MASTER_NAME} redis-master 6379 2
      sentinel auth-pass ${REDIS_SENTINEL_MASTER_NAME} ${REDIS_PASSWORD}
      sentinel down-after-milliseconds ${REDIS_SENTINEL_MASTER_NAME} 5000
      sentinel failover-timeout ${REDIS_SENTINEL_MASTER_NAME} 10000
      sentinel parallel-syncs ${REDIS_SENTINEL_MASTER_NAME} 1
      EOF
      && redis-sentinel /etc/redis/sentinel.conf"

  redis-sentinel-3:
    image: redis:7-alpine
    restart: unless-stopped
    depends_on:
      - redis-master
      - redis-replica-1
      - redis-replica-2
    command: >
      sh -c "cat <<EOF >/etc/redis/sentinel.conf
      port 26379
      sentinel monitor ${REDIS_SENTINEL_MASTER_NAME} redis-master 6379 2
      sentinel auth-pass ${REDIS_SENTINEL_MASTER_NAME} ${REDIS_PASSWORD}
      sentinel down-after-milliseconds ${REDIS_SENTINEL_MASTER_NAME} 5000
      sentinel failover-timeout ${REDIS_SENTINEL_MASTER_NAME} 10000
      sentinel parallel-syncs ${REDIS_SENTINEL_MASTER_NAME} 1
      EOF
      && redis-sentinel /etc/redis/sentinel.conf"

volumes:
  redis_master_data:
  redis_replica_1_data:
  redis_replica_2_data:
