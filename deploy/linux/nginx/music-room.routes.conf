# Shared routes — included by both HTTP and HTTPS server blocks.
# WebSocket: redirect bare /socket.io to the /ws prefix so the client
# Socket.IO path (/ws/socket.io) works without extra config.
location = /socket.io {
  return 308 /ws/socket.io$is_args$args;
}

location /socket.io/ {
  return 308 /ws/socket.io/$is_args$args;
}

location = /ws/socket.io {
  proxy_pass http://music_room_server;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  proxy_buffering off;
}

location /ws/socket.io/ {
  proxy_pass http://music_room_server;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  proxy_buffering off;
}

location /ws/ {
  proxy_pass http://music_room_server;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_read_timeout 600s;
  proxy_send_timeout 600s;
  proxy_buffering off;
}

# REST API
location /v1/ {
  proxy_pass http://music_room_server;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
}

# Health checks
location /health/ {
  proxy_pass http://music_room_server;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
}

# Frontend
location / {
  proxy_pass http://music_room_web;
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
}
