upstream music_room_web {
  server web:3000;
}

upstream music_room_server {
  server server:3001;
}

# HTTP → HTTPS redirect (when SSL is terminated here)
server {
  listen 80;
  server_name _;
  client_max_body_size 200m;

  # If you terminate SSL at this nginx, uncomment the redirect below and
  # configure the SSL server block.
  # return 301 https://$host$request_uri;

  # If you terminate SSL upstream (e.g. Cloudflare, load balancer), keep the
  # existing HTTP routing:
  include music-room.routes.conf;
}

