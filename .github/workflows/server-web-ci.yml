name: Server Web CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: node scripts/check-toolchain.mjs
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-env-sync.mjs
      - run: node --test scripts/write-tauri-latest-json.test.mjs
      - run: pnpm --filter @music-room/shared build
      - run: pnpm --filter @music-room/server typecheck
      - run: pnpm --filter @music-room/web typecheck
      - run: pnpm --filter @music-room/server test
      - run: pnpm --filter @music-room/web test
      - run: pnpm --filter @music-room/server build
      - run: pnpm --filter @music-room/web build

  docker-images:
    if: github.event_name == 'push'
    needs: validate-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/music-room-server
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - id: web-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/music-room-web
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          tags: ${{ steps.web-meta.outputs.tags }}
          labels: ${{ steps.web-meta.outputs.labels }}

  e2e:
    needs: validate-and-test
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: node scripts/check-toolchain.mjs
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @music-room/shared build
      - run: pnpm --filter @music-room/web exec playwright install --with-deps chromium
      - run: pnpm e2e
        env:
          REDIS_URL: redis://127.0.0.1:6379/15

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
