name: Release Clients

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_desktop:
    name: Build Desktop ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    env:
      MUSIC_ROOM_PUBLIC_ORIGIN: ${{ vars.MUSIC_ROOM_PUBLIC_ORIGIN || secrets.MUSIC_ROOM_PUBLIC_ORIGIN }}
      MUSIC_ROOM_UPDATER_ENDPOINT: https://github.com/witw123/music_room/releases/latest/download/latest.json
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_SIGNING_PUBLIC_KEY: ${{ vars.TAURI_SIGNING_PUBLIC_KEY || secrets.TAURI_SIGNING_PUBLIC_KEY }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner: windows-latest
            artifact: desktop-windows
            release_glob: |
              apps/desktop/release/*.exe
              apps/desktop/release/*.msi
              apps/desktop/release/*.json
              apps/desktop/release/*.sig
          - name: macos
            runner: macos-latest
            artifact: desktop-macos
            release_glob: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.tar.gz
              apps/desktop/release/*.json
              apps/desktop/release/*.sig
          - name: linux
            runner: ubuntu-latest
            artifact: desktop-linux
            release_glob: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
              apps/desktop/release/*.rpm
              apps/desktop/release/*.json
              apps/desktop/release/*.sig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate desktop remote origin
        run: node scripts/require-public-origin.mjs

      - name: Build and pack desktop app
        run: pnpm --filter @music-room/desktop run pack

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          if-no-files-found: error
          path: ${{ matrix.platform.release_glob }}

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      MUSIC_ROOM_PUBLIC_ORIGIN: ${{ vars.MUSIC_ROOM_PUBLIC_ORIGIN || secrets.MUSIC_ROOM_PUBLIC_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Android version metadata
        run: |
          echo "ANDROID_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Validate mobile remote origin
        run: node scripts/require-public-origin.mjs

      - name: Build Android APK
        env:
          MUSIC_ROOM_ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          MUSIC_ROOM_ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
        run: pnpm --filter @music-room/mobile run pack

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          if-no-files-found: error
          path: apps/mobile/release/*.apk

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build_desktop
      - build_android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate Tauri updater manifest
        run: node scripts/write-tauri-latest-json.mjs release-assets

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          ## 修复内容
          - 修复缓存播放与成员进出时可能出现的播放抖动、静音和重连抖动问题。
          - 新增软件内检查更新：桌面端可提示下载并安装更新，Android 端提示前往下载 APK。
          - 优化 P2P 分发、上传缓存、手动缓存下载与房间实时连接链路稳定性。
          - 精简播放运行时和房间页面编排，降低后续播放回归风险。
          EOF

      - name: Publish GitHub Release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Music Room $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Music Room $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi

          find release-assets -type f \
            \( -name '*.exe' -o -name '*.msi' -o -name '*.dmg' -o -name '*.tar.gz' -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.apk' -o -name '*.json' -o -name '*.sig' \) \
            -print0 | xargs -0 gh release upload "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --clobber
