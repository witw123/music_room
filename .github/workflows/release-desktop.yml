name: Release Clients

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_desktop:
    name: Build Desktop ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.runner }}
    env:
      MUSIC_ROOM_PUBLIC_ORIGIN: ${{ vars.MUSIC_ROOM_PUBLIC_ORIGIN || secrets.MUSIC_ROOM_PUBLIC_ORIGIN }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            runner: windows-latest
            artifact: desktop-windows
            release_glob: |
              apps/desktop/release/*.exe
              apps/desktop/release/*.msi
          - name: macos
            runner: macos-latest
            artifact: desktop-macos
            release_glob: |
              apps/desktop/release/*.dmg
              apps/desktop/release/*.tar.gz
          - name: linux
            runner: ubuntu-latest
            artifact: desktop-linux
            release_glob: |
              apps/desktop/release/*.AppImage
              apps/desktop/release/*.deb
              apps/desktop/release/*.rpm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux desktop dependencies
        if: matrix.platform.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate desktop remote origin
        run: node scripts/require-public-origin.mjs

      - name: Build and pack desktop app
        run: pnpm --filter @music-room/desktop run pack

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          if-no-files-found: error
          path: ${{ matrix.platform.release_glob }}

  build_android:
    name: Build Android
    runs-on: ubuntu-latest
    env:
      MUSIC_ROOM_PUBLIC_ORIGIN: ${{ vars.MUSIC_ROOM_PUBLIC_ORIGIN || secrets.MUSIC_ROOM_PUBLIC_ORIGIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve Android version metadata
        run: |
          echo "ANDROID_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Validate mobile remote origin
        run: node scripts/require-public-origin.mjs

      - name: Build Android APK
        env:
          MUSIC_ROOM_ANDROID_VERSION_CODE: ${{ env.ANDROID_VERSION_CODE }}
          MUSIC_ROOM_ANDROID_VERSION_NAME: ${{ env.ANDROID_VERSION_NAME }}
        run: pnpm --filter @music-room/mobile run pack

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-android
          if-no-files-found: error
          path: apps/mobile/release/*.apk

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build_desktop
      - build_android

    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.exe
            release-assets/**/*.msi
            release-assets/**/*.dmg
            release-assets/**/*.tar.gz
            release-assets/**/*.AppImage
            release-assets/**/*.deb
            release-assets/**/*.rpm
            release-assets/**/*.apk
