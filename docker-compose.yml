services:
  postgres:
    image: postgres:16-alpine
    container_name: music-room-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-music_room}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d music_room"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: music-room-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  coturn:
    image: coturn/coturn:4.6.3
    container_name: music-room-coturn
    command:
      - -n
      - --log-file=stdout
      - --fingerprint
      - --lt-cred-mech
      - --realm=${TURN_REALM:-localhost}
      - --user=${NEXT_PUBLIC_TURN_USERNAME:-music-room}:${NEXT_PUBLIC_TURN_CREDENTIAL:-music-room-turn-secret}
      - --no-cli
    ports:
      - "3478:3478"
      - "3478:3478/udp"

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: music-room-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-music_room}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
        NEXT_PUBLIC_SOCKET_PATH: ${NEXT_PUBLIC_SOCKET_PATH:-/ws/socket.io}
        NEXT_PUBLIC_STUN_URL: ${NEXT_PUBLIC_STUN_URL:-stun:stun.l.google.com:19302}
        NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL:-turn:localhost:3478}
        NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME:-music-room}
        NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL:-music-room-turn-secret}
        NEXT_PUBLIC_WEBRTC_ICE_SERVERS: ${NEXT_PUBLIC_WEBRTC_ICE_SERVERS:-}
    container_name: music-room-web
    depends_on:
      server:
        condition: service_healthy
      coturn:
        condition: service_started
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:3001}
      NEXT_PUBLIC_SOCKET_PATH: ${NEXT_PUBLIC_SOCKET_PATH:-/ws/socket.io}
      NEXT_PUBLIC_STUN_URL: ${NEXT_PUBLIC_STUN_URL:-stun:stun.l.google.com:19302}
      NEXT_PUBLIC_TURN_URL: ${NEXT_PUBLIC_TURN_URL:-turn:localhost:3478}
      NEXT_PUBLIC_TURN_USERNAME: ${NEXT_PUBLIC_TURN_USERNAME:-music-room}
      NEXT_PUBLIC_TURN_CREDENTIAL: ${NEXT_PUBLIC_TURN_CREDENTIAL:-music-room-turn-secret}
      NEXT_PUBLIC_WEBRTC_ICE_SERVERS: ${NEXT_PUBLIC_WEBRTC_ICE_SERVERS:-}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
